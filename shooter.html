<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>CatchStarJS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="static/coco.ico.png">
    <script src="static/js/shooter.js" defer></script>
    <style>
        * {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background-color: #000;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}

header {
    width: 100%;
    max-width: 500px;
    padding: 10px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

h1 {
    font-size: 1.4rem;
    margin: 0;
}

#score-container {
    font-size: 1.1rem;
}

main {
    width: 100%;
    max-width: 500px;
    padding: 0 16px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

#game-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 3 / 4;
    border-radius: 12px;
    overflow: hidden;
    border: 2px solid #444;
    background: #000;
}

canvas {
    width: 100%;
    height: 100%;
    display: block;
}

/* Overlays (menu + game over) */
.overlay {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at top, rgba(59,130,246,0.35), rgba(0,0,0,0.95));
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
}

.overlay.visible {
    opacity: 1;
    pointer-events: auto;
}

.overlay h2 {
    margin: 0 0 10px;
    font-size: 1.6rem;
}

.overlay p {
    margin: 0 0 16px;
    font-size: 1rem;
    opacity: 0.9;
}

.overlay button {
    padding: 12px 26px;
    font-size: 1.05rem;
    font-weight: 600;
    border-radius: 999px;
    border: none;
    background: linear-gradient(135deg, #3b82f6, #22c55e);
    color: #fff;
    cursor: pointer;
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.5);
    transition: transform 0.1s ease, box-shadow 0.1s ease, opacity 0.15s ease;
}

.overlay button:active {
    transform: scale(0.96);
    box-shadow: 0 3px 10px rgba(0, 0, 0, 0.7);
    opacity: 0.9;
}

@media (max-width: 400px) {
    h1 {
        font-size: 1.2rem;
    }

    .overlay h2 {
        font-size: 1.4rem;
    }

    .overlay button {
        font-size: 0.95rem;
        padding: 10px 20px;
    }
}

    </style>
</head>
<body>
    <header>
        <h1>CatchStarJS</h1>
        <div id="score-container">
            Score : <span id="score">0</span>
        </div>
    </header>

    <main>
        <div id="game-wrapper">
            <canvas id="game"></canvas>

            <!-- Écran de menu -->
            <div id="menu-screen" class="overlay visible">
                <h2>CatchStarJS</h2>
                <p>Glisse ou utilise les flèches pour attraper les étoiles rouges.</p>
                <button id="btn-start">▶ Jouer</button>
            </div>

            <!-- Écran de Game Over -->
            <div id="gameover-screen" class="overlay">
                <h2>Game Over</h2>
                <p>Score : <span id="final-score">0</span></p>
                <button id="btn-restart">↻ Rejouer</button>
            </div>
        </div>
    </main>
</body>
</html>
