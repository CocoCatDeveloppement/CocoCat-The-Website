<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>404 – T'es perdu mon reuf</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="{{ url_for('static', filename='coco.ico.png') }}">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0d0d0d;
            color: white;
            font-family: "Poppins", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            animation: pop 0.6s ease-out;
        }

        p {
            font-size: 1.2rem;
            max-width: 600px;
            opacity: 0.9;
        }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .meme {
            margin-top: 30px;
            width: 300px;
            border-radius: 12px;
            box-shadow: 0 0 20px #ff00ff88;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .btn {
            margin-top: 30px;
            padding: 12px 25px;
            background: linear-gradient(135deg, #ff00ff, #ff8800);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            text-decoration: none;
            transition: 0.2s;
            box-shadow: 0 0 10px #ff00ff88;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #ff8800aa;
        }
    </style>
</head>

<body>

    <h1>💀 404 mon reuf…</h1>
    <p>
        T'as pas trouvé la page…  
        <br>  
        C’est pas un malware, juste toi qui t’es perdu dans le multivers 😭  
        <br>  
        Respire, ça va bien s’passer (comme dirait Darmanin… ou pas).
    </p>

    <!-- Mème intégré -->
    <img class="meme" src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExeTBmOXBvYTRhNzFsdTh1NGxqMHYwdDh3a2ZuNG1raHN4eTV0bjdvbCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/kC8N6DPOkbqWTxkNTe/giphy.gif" alt="meme perdu">

    <a href="{{ url_for('main.index') }}" class="btn">Retour à l’accueil 🔙</a>

</body>
</html>
